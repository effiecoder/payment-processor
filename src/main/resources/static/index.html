<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Processor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Login Screen -->
        <div id="login-screen" class="screen login-screen">
            <div class="login-box">
                <h1>💎 Payment Processor</h1>
                <p class="subtitle">Nowoczesny system płatności ISO20022</p>
                <form id="login-form">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Nazwa użytkownika" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Hasło" required>
                    </div>
                    <button type="submit">Zaloguj się</button>
                </form>
                <p id="login-error" class="error hidden"></p>
            </div>
        </div>

        <!-- Main Screen -->
        <div id="main-screen" class="screen main-screen hidden">
            <header>
                <h1>💎 Payment Processor</h1>
                <div class="header-actions">
                    <button id="refresh-btn" class="icon-btn" title="Odśwież">↻</button>
                    <button id="logout-btn" class="icon-btn" title="Wyloguj">⏻</button>
                </div>
            </header>

            <!-- Master-Detail Layout -->
            <div class="master-detail">
                <!-- Left Panel: List -->
                <div class="master-panel" id="master-panel">
                    <div class="toolbar-compact">
                        <select id="status-filter">
                            <option value="">📋 Wszystkie</option>
                            <option value="RECEIVED">📥 Odebrane</option>
                            <option value="VALIDATED">✅ Zwalidowane</option>
                            <option value="PENDING_APPROVAL">⏳ Oczekuje</option>
                            <option value="AUTHORIZED">🔐 Autoryzowane</option>
                            <option value="APPROVED">✓ Zatwierdzone</option>
                            <option value="REJECTED">✕ Odrzucone</option>
                            <option value="SUSPENDED">⏸ Wstrzymane</option>
                        </select>
                        <button id="new-transaction-btn" class="btn btn-primary btn-sm">➕</button>
                    </div>

                    <!-- Status Flow (compact) -->
                    <div class="status-flow-compact" id="status-flow">
                        <div class="status-flow-diagram" id="status-flow-diagram"></div>
                    </div>

                    <div class="transactions-list-compact" id="transactions-list"></div>
                    
                    <div class="pagination-compact" id="pagination">
                        <button id="prev-page">←</button>
                        <span id="page-info">1</span>
                        <button id="next-page">→</button>
                    </div>
                </div>

                <!-- Right Panel: Detail/Form -->
                <div class="detail-panel" id="detail-panel">
                    <!-- Empty state -->
                    <div class="detail-empty" id="detail-empty">
                        <div class="icon">👈</div>
                        <p>Wybierz transakcję z listy<br>lub dodaj nową</p>
                    </div>

                    <!-- Transaction Form (create/edit/view) -->
                    <div class="detail-content hidden" id="detail-content">
                        <div class="detail-header">
                            <h2 id="detail-title">Szczegóły transakcji</h2>
                            <div class="detail-actions" id="detail-actions"></div>
                        </div>
                        <form id="transaction-form">
                            <!-- Nagłówek wiadomości -->
                            <fieldset class="form-section">
                                <legend>📨 Nagłówek wiadomości</legend>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Message ID</label>
                                        <input type="text" name="messageId" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>Payment Instruction ID</label>
                                        <input type="text" name="paymentInstructionId" readonly>
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Data utworzenia</label>
                                        <input type="datetime-local" name="creationDateTime" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>Metoda płatności</label>
                                        <select name="paymentMethod" disabled>
                                            <option value="TRN">TRN - Transfer</option>
                                            <option value="TRA">TRA - Treasury</option>
                                            <option value="CCB">CCB - Clearing</option>
                                        </select>
                                    </div>
                                </div>
                            </fieldset>

                            <!-- Dane płatności -->
                            <fieldset class="form-section">
                                <legend>💰 Dane płatności</legend>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Kwota</label>
                                        <input type="number" step="0.01" name="amount" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Waluta</label>
                                        <select name="currency" required>
                                            <option value="PLN">PLN</option>
                                            <option value="EUR">EUR</option>
                                            <option value="USD">USD</option>
                                            <option value="GBP">GBP</option>
                                            <option value="CHF">CHF</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Data waluty</label>
                                        <input type="date" name="valueDate" required>
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Data realizacji</label>
                                        <input type="date" name="requestedExecutionDate">
                                    </div>
                                    <div class="form-group">
                                        <label>Charge Bearer</label>
                                        <select name="chargeBearer">
                                            <option value="SLEV">SLEV - Shared</option>
                                            <option value="SHAR">SHAR - Shared</option>
                                            <option value="DEBT">DEBT - Debtor</option>
                                            <option value="CRCD">CRCD - Creditor</option>
                                        </select>
                                    </div>
                                </div>
                            </fieldset>

                            <!-- Nadawca (Debtor) -->
                            <fieldset class="form-section">
                                <legend>📤 Nadawca (Debtor)</legend>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Nazwa</label>
                                        <input type="text" name="debtorName">
                                    </div>
                                    <div class="form-group">
                                        <label>LEI</label>
                                        <input type="text" name="debtorLegalName">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>IBAN</label>
                                        <input type="text" name="debtorAccountIban" required>
                                    </div>
                                    <div class="form-group">
                                        <label>BIC/SWIFT</label>
                                        <input type="text" name="debtorAgentBic">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Adres</label>
                                        <input type="text" name="debtorAddressLine">
                                    </div>
                                    <div class="form-group">
                                        <label>Kraj</label>
                                        <input type="text" name="debtorCountry" maxlength="2">
                                    </div>
                                </div>
                            </fieldset>

                            <!-- Odbiorca (Creditor) -->
                            <fieldset class="form-section">
                                <legend>📥 Odbiorca (Creditor)</legend>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Nazwa</label>
                                        <input type="text" name="creditorName">
                                    </div>
                                    <div class="form-group">
                                        <label>LEI</label>
                                        <input type="text" name="creditorLegalName">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>IBAN</label>
                                        <input type="text" name="creditorAccountIban" required>
                                    </div>
                                    <div class="form-group">
                                        <label>BIC/SWIFT</label>
                                        <input type="text" name="creditorAgentBic">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Adres</label>
                                        <input type="text" name="creditorAddressLine">
                                    </div>
                                    <div class="form-group">
                                        <label>Kraj</label>
                                        <input type="text" name="creditorCountry" maxlength="2">
                                    </div>
                                </div>
                            </fieldset>

                            <!-- Remittance -->
                            <fieldset class="form-section">
                                <legend>📝 Remittance</legend>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Tytuł (Unstructured)</label>
                                        <textarea name="remittanceUnstructured" rows="2"></textarea>
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Referencja (Structured)</label>
                                        <input type="text" name="remittanceReference">
                                    </div>
                                    <div class="form-group">
                                        <label>Typ referencji</label>
                                        <select name="remittanceStructuredType">
                                            <option value="">Wybierz...</option>
                                            <option value="SCOR">SCOR</option>
                                            <option value="RF01">RF01</option>
                                            <option value="PMNT">PMNT</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Kod celu</label>
                                        <select name="purposeCode">
                                            <option value="">Wybierz...</option>
                                            <option value="SUPP">SUPP - Supply Chain</option>
                                            <option value="PENS">PENS - Pension</option>
                                            <option value="SALA">SALA - Salary</option>
                                            <option value="TAXS">TAXS - Tax</option>
                                            <option value="TRAD">TRAD - Trade</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Transaction ID</label>
                                        <input type="text" name="transactionId">
                                    </div>
                                </div>
                            </fieldset>

                            <!-- Status & Audit -->
                            <fieldset class="form-section">
                                <legend>📋 Status & Audit</legend>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Status</label>
                                        <input type="text" name="status" readonly class="status-readonly">
                                    </div>
                                    <div class="form-group">
                                        <label>Utworzono</label>
                                        <input type="text" name="createdAt" readonly>
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Autoryzowane przez</label>
                                        <input type="text" name="authorizedBy" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label>Zatwierdzone przez</label>
                                        <input type="text" name="approvedBy" readonly>
                                    </div>
                                </div>
                                <div class="form-row" id="rejection-row" style="display:none;">
                                    <div class="form-group">
                                        <label style="color: var(--accent-danger);">Powód odrzucenia</label>
                                        <input type="text" name="rejectionReason" readonly style="color: var(--accent-danger);">
                                    </div>
                                </div>
                            </fieldset>

                            <!-- Form Actions -->
                            <div class="form-actions" id="form-actions"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
