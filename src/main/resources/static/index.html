<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Flow Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Login Screen -->
        <div id="login-screen" class="login-screen">
            <div class="login-box">
                <h1>💎 Payment Flow</h1>
                <p class="subtitle">System płatności ISO20022</p>
                <form id="login-form">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Nazwa użytkownika" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Hasło" required>
                    </div>
                    <button type="submit">Zaloguj się</button>
                </form>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-app" class="hidden">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <div class="header-logo">💎</div>
                    <span class="header-title">Payment Flow Status</span>
                </div>
                <div class="header-right">
                    <button class="header-btn">🔔</button>
                    <div class="header-avatar"></div>
                </div>
            </header>

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="status-summary">
                    <span class="status-summary-dot"></span>
                    <span>Weryfikacja (<span id="total-count">0</span>)</span>
                </div>
                <div class="status-steps" id="status-steps"></div>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Left Panel -->
                <div class="left-panel">
                    <div class="toolbar">
                        <input type="text" class="search-input" id="search-input" placeholder="Wszystkie">
                        <button class="filter-btn">⚙️</button>
                        <button class="new-tx-btn" id="new-tx-btn">+ Nowa</button>
                    </div>
                    <div class="tx-list" id="tx-list"></div>
                </div>

                <!-- Right Panel -->
                <div class="right-panel" id="right-panel">
                    <div class="right-panel-empty" id="empty-state">
                        Wybierz transakcję z listy
                    </div>
                    
                    <!-- Detail View -->
                    <div class="hidden" id="detail-view">
                        <div class="detail-header">
                            <div class="detail-title">
                                <span>📁</span>
                                <span>Transakcja #<span id="detail-id"></span></span>
                            </div>
                            <button class="detail-close" id="close-detail">✕</button>
                        </div>
                        <div class="detail-content" id="detail-content"></div>
                        <div class="action-bar" id="action-bar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
