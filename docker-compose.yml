version: '3.8'

services:
  payment-processor:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:testdb
      - SPRING_DATASOURCE_DRIVER-CLASS-NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=
      - APP_JWT_SECRET=YourSecretKeyForJwtTokenGenerationMustBeLongEnough256Bits!
      - APP_JWT_EXPIRATION=900000
      - APP_JWT_REFRESH_EXPIRATION=604800000
      - AUTHORIZATION_AUTOMATIC-THRESHOLD=10000
      - AUTHORIZATION_MANUAL-THRESHOLD=100000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # H2 Database (optional - using in-memory by default)
  # Uncomment to use external H2 database
  # h2:
  #   image: oylehassen/h2:latest
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     - H2_OPTIONS=-ifNotExists
